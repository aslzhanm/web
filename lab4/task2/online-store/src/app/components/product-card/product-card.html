 <div class="card">
    <img [src]="product.image" [alt]=" product.name" class="main-img">

    <div class="info">
        <h3 class="product-title">{{ product.name }}</h3>
        <p class="description">{{ product.description }}</p>
        <div class="rating">⭐ {{ product.rating }} / 5</div>
        <div class="price">{{ product.price | number }} ₸</div>

        <div class="actions">
            <a [href]=" product.link" target="_blank" class="buy-btn">Buy on Kaspi</a>
            <div class="share-buttons">
                <button (click)="shareToWhatsApp()" class="share-wa">WhatsApp</button>
                <button (click)="shareToTelegram()" class="share-tg">Telegram</button>
            </div>
        </div>

        <div>
            <p class="heart">❤️ {{product.likes }}</p>
            <button class="like" (click)="like()">Like</button>
        </div>

        
        <button class="delete" (click)="remove()">Delete</button>

    </div>
 </div>
