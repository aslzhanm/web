<h2>Album Detail</h2>

<div *ngIf="album">
    <p><strong>ID:</strong> {{ album.id }} </p>
    <p><strong>User ID:</strong> {{album.userId}} </p>
 
    <label>Title:</label>
    <input [(ngModel)]="album.tite" />

    <br><br>

    <button (click)="viewPhotos()">View Photos</button>


    <button (click)="save()">Save</button>
    <button (click)="goBack()">Back</button>

</div>
